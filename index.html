<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny Weight Maintenance Informer</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Welcome Screen -->
    <div id="welcomeScreen" class="screen">
        <div class="welcomeBox">

            <h1>🐰 Welcome!</h1>

            <h2>Welcome to the Online Bunny Weight Maintenance Informer Website.</h2>

            <p>Click anywhere to continue.</p>

        </div>
    </div>

    <!-- Main Website -->
    <div id="mainContent" class="hidden">

        <div class="container">

            <h1>🐇 Bunny Weight Maintenance Informer</h1>

            <p class="description">
                Fill out the information below to learn whether your bunny's weight
                is within a healthy range for its age group and breed size.
            </p>

            <!-- Weight -->
            <label for="weight">
                The weight of my bunny is
            </label>

            <div class="inputRow">

                <input
                    type="number"
                    id="weight"
                    min="0"
                    step="0.1"
                    placeholder="Enter weight">

                <span>Pounds</span>

            </div>

            <br>

            <!-- Age -->
            <label for="age">

                The age group my bunny is in is

            </label>

            <select id="age">

                <option value="">Select age group</option>

                <option value="baby">
                    Baby (0–3 months)
                </option>

                <option value="young">
                    Young (3–12 months)
                </option>

                <option value="adult">
                    Adult (1–5 years)
                </option>

                <option value="senior">
                    Senior (5+ years)
                </option>

            </select>

            <br><br>

            <!-- Breed -->
            <label for="breed">

                My bunny's breed size is

            </label>

            <select id="breed">

                <option value="">
                    Select breed size
                </option>

                <option value="small">
                    Small Breed
                </option>

                <option value="medium">
                    Medium Breed
                </option>

                <option value="large">
                    Large Breed
                </option>

                <option value="giant">
                    Giant Breed
                </option>

            </select>

            <br><br>

            <button id="submitBtn" disabled>

                Submit

            </button>

        </div>

    </div>

<script src="script.js"></script>

</body>
</html>
